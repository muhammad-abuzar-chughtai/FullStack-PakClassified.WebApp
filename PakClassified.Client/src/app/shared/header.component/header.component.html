<header class="header px-4">

  <div class="left-section">
    <div class="logo"><span class="normal-text">PakClassified — Geo-Targeting Advertising WebApp</span></div>
  </div>

  <div class="right-section">
 
    <div class="user-info" *ngIf="isLoggedIn()">
      <img [src]="profilePic()" alt="Profile" class="user-image">
      <span class="username">
        {{ displayName() }}
      </span>
    </div>
 
    <button *ngIf="!isLoggedIn()" (click)="login()">Sign In</button>
    <button *ngIf="!isLoggedIn()" (click)="signup()">Sign Up</button>
    <button *ngIf="isLoggedIn()" (click)="logout()">Logout</button>
  </div>

</header>
